name: build-population-gpkg

# 웹에서 수동 실행("Run workflow") 하거나, main 에 관련 파일이 바뀌면 자동 실행.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "data/raw/**"
      - "requirements.txt"
      - ".github/workflows/build.yml"

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 한글 폰트 설치 (지도 라벨용)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      - name: "[1단계] 셰이프파일 점검"
        run: |
          python src/inspect_grids.py \
            --zip data/raw/seoul_1km_202410.zip \
                  data/raw/incheon_1km_202410.zip \
                  data/raw/gyeonggi_1km_202410.zip

      - name: "[2단계] 병합 → GeoPackage 생성"
        run: |
          python src/build_population_gpkg.py \
            --zip data/raw/seoul_1km_202410.zip \
                  data/raw/incheon_1km_202410.zip \
                  data/raw/gyeonggi_1km_202410.zip \
            --out data/processed/seoul_incheon_gyeonggi_1km_pop.gpkg

      - name: "[3단계] 행정명(시도·시군구·읍면동) 결합"
        run: python scripts/add_admin_names.py

      - name: "[4단계] 프론트엔드용 정적 GeoJSON 내보내기(web/data/grid.geojson)"
        run: OUT=web/data/grid.geojson python scripts/export_geojson.py

      - name: "인구밀도 지도 렌더링(PNG)"
        run: python scripts/plot_density.py

      - name: 결과물 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: population-density-outputs
          path: |
            data/processed/*.gpkg
            density_map.png
            web/data/grid.geojson
          if-no-files-found: error

      - name: Pages 설정
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: "Pages 아티팩트 업로드(web/ = 손작성 Leaflet 앱 + grid.geojson)"
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
