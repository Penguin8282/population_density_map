<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <!-- 모바일 대응: 초기 스케일 고정 (작업 7에서 재점검) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>수도권 1km 격자 인구밀도 지도</title>

  <!-- Leaflet (자체 호스팅 = 유일한 외부 라이브러리, CDN 의존 없음) -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <script src="vendor/leaflet/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- 읍면동 검색 (좌상단) -->
  <div id="search-panel" class="panel">
    <div class="panel-title">읍면동 검색</div>
    <input id="search-input" type="search" list="dong-list"
           placeholder="예: 역삼동, 분당구 정자동" autocomplete="off" />
    <datalist id="dong-list"></datalist>
    <button id="search-clear" type="button" title="선택 해제">✕</button>
  </div>

  <!-- 범례 (작업 1에서 클릭 필터 추가) -->
  <div id="legend" class="panel" aria-label="인구밀도 범례">
    <div class="panel-title">인구밀도 (명/㎢)</div>

    <!-- 색상 분류 방식 토글 (작업 5) -->
    <div id="class-toggle">
      <button type="button" data-method="quantile" class="active"
              title="분위수: 각 구간에 들어가는 격자 수가 비슷하도록 경계를 나눔">분위수</button>
      <button type="button" data-method="equal"
              title="등간격: 밀도 범위(최소~최대)를 같은 폭으로 나눔">등간격</button>
      <button type="button" data-method="log"
              title="로그: 로그 스케일로 나눔 — 값이 한쪽에 몰린 데이터에 적합">로그</button>
      <span class="info-icon" tabindex="0" title="분위수 · 각 구간 격자 수가 비슷하게 나뉨&#10;등간격 · 밀도 범위를 균등한 폭으로 나눔&#10;로그 · 로그 스케일(편중 데이터에 적합)">?</span>
    </div>

    <div id="legend-items"></div>
    <div class="panel-hint">구간 클릭 → 해당 격자만 강조</div>

    <!-- 밀도 범위 필터 (작업 4 · 네이티브 이중 슬라이더) -->
    <div id="range-filter">
      <div class="range-title">밀도 범위 필터 (명/㎢)</div>
      <div class="range-wrap">
        <div class="range-track"></div>
        <div class="range-track-fill" id="range-fill"></div>
        <input type="range" id="range-min" />
        <input type="range" id="range-max" />
      </div>
      <div id="range-readout"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
